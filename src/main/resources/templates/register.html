<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Register</title>
  <!-- inc/css.html include -->
  <th:block th:replace="inc/css"></th:block>

</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="col-12 col-md-6 col-lg-4">

    <div class="card shadow p-4">
      <h3 class="text-center mb-4">Register</h3>

      <form th:action="@{/mvc/customer/register}"
            th:object="${customerRegisterRequestDto}"
            method="post">

        <!-- NAME -->
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" th:field="*{name}" class="form-control" placeholder="Enter name">

          <div class="text-danger mt-1"
               th:if="${#fields.hasErrors('name')}"
               th:errors="*{name}">
          </div>
        </div>

        <!-- SURNAME -->
        <div class="mb-3">
          <label class="form-label">Surname</label>
          <input type="text" th:field="*{surname}" class="form-control" placeholder="Enter surname">

          <div class="text-danger mt-1"
               th:if="${#fields.hasErrors('surname')}"
               th:errors="*{surname}">
          </div>
        </div>

        <!-- EMAIL -->
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" th:field="*{email}" class="form-control" placeholder="Enter email">

          <div class="text-danger mt-1"
               th:if="${#fields.hasErrors('email')}"
               th:errors="*{email}">
          </div>
        </div>

        <!-- PHONE -->
        <div class="mb-3">
          <label class="form-label">Phone</label>
          <input type="text" th:field="*{phone}" class="form-control" placeholder="Enter phone">

          <div class="text-danger mt-1"
               th:if="${#fields.hasErrors('phone')}"
               th:errors="*{phone}">
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" th:field="*{password}" class="form-control" placeholder="Enter password">

          <div class="text-danger mt-1"
               th:if="${#fields.hasErrors('password')}"
               th:errors="*{password}">
          </div>
        </div>

        <!-- GLOBAL ERROR -->
        <div class="text-danger mb-3"
             th:if="${registerError}">
          This email or phone number is already in use.
        </div>

        <button type="submit" class="btn btn-success w-100">
          Register
        </button>

        <div class="text-center mt-3">
          <a th:href="@{/mvc/customer/login}">Already have an account?</a>
        </div>

      </form>
    </div>

  </div>
</div>

</body>
</html>
